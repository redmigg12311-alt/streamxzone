<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.compiled.min.js"></script>

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --red:   #ff1f3d;
  --ease:  cubic-bezier(.4,0,.2,1);
}

html, body {
  width:100%; height:100%;
  background:#000; overflow:hidden;
  font-family:'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  color:#fff;
  user-select:none; -webkit-user-select:none;
}

/* ── SHELL ── */
#shell {
  position:relative; width:100%; height:100%;
  background:#000; cursor:default;
}
#shell.hide-cursor { cursor:none; }

/* ── VIDEO ── */
#video {
  position:absolute; inset:0;
  width:100%; height:100%;
  background:#000; display:block; z-index:1;
}

/* ── VIGNETTES ── */
.vig {
  position:absolute; left:0; right:0; z-index:5;
  pointer-events:none;
  opacity:0; transition:opacity .3s var(--ease);
}
#vig-top { top:0; height:100px; background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent); }
#vig-bot { bottom:0; height:150px; background:linear-gradient(to top,rgba(0,0,0,.88),rgba(0,0,0,.3) 55%,transparent); }
#shell.ctrl-on .vig { opacity:1; }

/* ── BUFFERING ── */
#buf {
  position:absolute; inset:0; z-index:20;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none; opacity:0; transition:opacity .25s;
}
#buf.on { opacity:1; }
#buf-ring {
  width:48px; height:48px;
  border:3px solid rgba(255,255,255,.14);
  border-top-color:var(--red);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── CENTER RIPPLE ── */
#ripple {
  position:absolute; inset:0; z-index:18;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}
.rip {
  position:absolute;
  width:72px; height:72px; border-radius:50%;
  background:rgba(255,255,255,.16);
  display:flex; align-items:center; justify-content:center;
  font-size:26px;
  animation:rip-out .48s var(--ease) forwards;
}
@keyframes rip-out {
  0%   { transform:scale(.65); opacity:1; }
  65%  { transform:scale(1.18); opacity:.6; }
  100% { transform:scale(1.35); opacity:0; }
}

/* ── ERROR SCREEN ── */
#err-screen {
  position:absolute; inset:0; z-index:80;
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:13px;
  background:rgba(0,0,0,.88); text-align:center; padding:28px;
}
#err-screen.on { display:flex; }
.err-ico   { font-size:46px; }
.err-title { font-size:18px; font-weight:700; letter-spacing:-.2px; }
.err-sub   { font-size:13px; color:rgba(255,255,255,.52); max-width:290px; line-height:1.65; }
#btn-retry {
  margin-top:6px; background:var(--red); color:#fff; border:none;
  font-size:13px; font-weight:700; letter-spacing:.3px;
  padding:9px 24px; border-radius:7px; cursor:pointer; font-family:inherit;
  transition:background .18s, transform .13s;
}
#btn-retry:hover  { background:#d4001a; }
#btn-retry:active { transform:scale(.95); }

/* ── CONTROLS PANEL ── */
#controls {
  position:absolute; bottom:0; left:0; right:0; z-index:25;
  padding-bottom:env(safe-area-inset-bottom,0px);
  opacity:0; transform:translateY(6px);
  transition:opacity .28s var(--ease), transform .28s var(--ease);
  pointer-events:none;
}
#shell.ctrl-on #controls { opacity:1; transform:translateY(0); pointer-events:auto; }

/* seek row */
.seek-row {
  padding:0 12px 3px; position:relative;
}
.seek-track {
  position:relative; height:3px; border-radius:3px;
  background:rgba(255,255,255,.22); cursor:pointer;
  transition:height .18s var(--ease);
}
.seek-row:hover .seek-track { height:5px; }
.seek-buf, .seek-prog {
  position:absolute; top:0; left:0; height:100%;
  border-radius:3px; pointer-events:none; width:0%;
}
.seek-buf  { background:rgba(255,255,255,.38); }
.seek-prog { background:var(--red); }
.seek-thumb {
  position:absolute; top:50%; left:0%;
  width:14px; height:14px; border-radius:50%; background:#fff;
  transform:translate(-50%,-50%) scale(0);
  transition:transform .18s var(--ease);
  pointer-events:none;
  box-shadow:0 1px 5px rgba(0,0,0,.5);
}
.seek-row:hover .seek-thumb { transform:translate(-50%,-50%) scale(1); }
.seek-input {
  position:absolute; inset:-10px 0; width:100%;
  opacity:0; cursor:pointer; -webkit-appearance:none; z-index:2;
}
.seek-tip {
  position:absolute; bottom:16px; display:none;
  background:rgba(0,0,0,.82); color:#fff;
  font-size:11px; font-weight:600; letter-spacing:.2px;
  padding:3px 7px; border-radius:4px;
  pointer-events:none; transform:translateX(-50%); white-space:nowrap;
}

/* button row */
.btn-row {
  display:flex; align-items:center;
  height:52px; padding:0 6px; gap:0;
}
.cb {
  background:none; border:none; color:#fff;
  width:40px; height:40px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border-radius:6px; flex-shrink:0;
  transition:background .15s, transform .12s;
}
.cb:hover  { background:rgba(255,255,255,.1); }
.cb:active { transform:scale(.88); }
.cb svg { width:20px; height:20px; fill:currentColor; pointer-events:none; display:block; }
.cb.lg svg { width:25px; height:25px; }

/* volume cluster */
.vol-cluster { display:flex; align-items:center; }
.vol-bar-wrap {
  overflow:hidden; width:0;
  transition:width .22s var(--ease);
  display:flex; align-items:center;
}
.vol-cluster:hover .vol-bar-wrap,
.vol-bar-wrap:focus-within { width:62px; }
.vol-range {
  width:58px; height:3px; flex-shrink:0;
  -webkit-appearance:none; background:rgba(255,255,255,.3);
  border-radius:2px; cursor:pointer; outline:none;
}
.vol-range::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; background:#fff; border-radius:50%; cursor:pointer; }
.vol-range::-moz-range-thumb      { width:12px; height:12px; background:#fff; border-radius:50%; cursor:pointer; border:none; }

/* time / live */
.time-box {
  display:flex; align-items:center; gap:5px;
  padding:0 6px; flex-shrink:0; white-space:nowrap;
  font-size:12px; font-weight:500; color:rgba(255,255,255,.68); letter-spacing:.2px;
}
.time-box b { color:#fff; font-weight:700; }
.live-pill {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--red); color:#fff;
  font-size:10px; font-weight:800; letter-spacing:.8px;
  padding:3px 8px; border-radius:4px; cursor:pointer;
  transition:background .18s;
}
.live-pill:hover { background:#d4001a; }
.live-pill.stale { background:rgba(255,255,255,.2); color:rgba(255,255,255,.55); }
.live-dot { width:6px; height:6px; border-radius:50%; background:#fff; animation:lb 1.2s ease-in-out infinite; }
.live-pill.stale .live-dot { animation:none; opacity:.35; }
@keyframes lb { 0%,100%{opacity:1} 50%{opacity:.15} }

.spacer { flex:1; }

/* quality */
.qual-wrap { position:relative; }
.qual-btn {
  display:flex; align-items:center; gap:4px;
  background:none; border:1px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.72); font-size:11px; font-weight:700; letter-spacing:.3px;
  padding:4px 9px; border-radius:5px; cursor:pointer; font-family:inherit;
  transition:border-color .15s, color .15s, background .15s; white-space:nowrap;
}
.qual-btn:hover { border-color:rgba(255,255,255,.5); color:#fff; background:rgba(255,255,255,.07); }
.qual-ico { font-size:13px; }
.qual-menu {
  display:none; position:absolute; bottom:calc(100% + 8px); right:0;
  background:rgba(20,20,24,.97);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px; min-width:140px; padding:6px 0;
  z-index:999; box-shadow:0 8px 30px rgba(0,0,0,.72);
  animation:menu-up .18s var(--ease);
}
@keyframes menu-up { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.qual-menu.open { display:block; }
.qm-head { font-size:9px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; color:rgba(255,255,255,.28); padding:6px 14px 4px; }
.qm-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 14px; font-size:13px; color:rgba(255,255,255,.68);
  cursor:pointer; transition:background .12s, color .12s; gap:14px;
}
.qm-item:hover { background:rgba(255,255,255,.07); color:#fff; }
.qm-item.on { color:#fff; }
.qm-check { color:var(--red); font-size:13px; opacity:0; flex-shrink:0; }
.qm-item.on .qm-check { opacity:1; }
.qm-kbps { font-size:10px; color:rgba(255,255,255,.28); }

#btn-pip { display:none; }

/* mobile */
@media(max-width:480px) {
  .qual-btn .ql-lbl { display:none; }
  .cb { width:36px; height:36px; }
  .cb svg { width:18px; height:18px; }
  .cb.lg svg { width:22px; height:22px; }
  .time-box { font-size:11px; padding:0 3px; }
}
</style>
</head>

<body>
<div id="shell">

  <video id="video" playsinline preload="auto"></video>

  <div class="vig" id="vig-top"></div>
  <div class="vig" id="vig-bot"></div>

  <!-- Buffering -->
  <div id="buf"><div id="buf-ring"></div></div>

  <!-- Ripple -->
  <div id="ripple"></div>

  <!-- Error -->
  <div id="err-screen">
    <div class="err-ico">📡</div>
    <div class="err-title">Stream Unavailable</div>
    <div class="err-sub" id="err-sub">The stream could not be loaded. It may have expired or requires fresh authentication.</div>
    <button id="btn-retry">↻ Retry</button>
  </div>

  <!-- Controls -->
  <div id="controls">

    <div class="seek-row" id="seek-row">
      <div class="seek-track">
        <div class="seek-buf"   id="seek-buf"></div>
        <div class="seek-prog"  id="seek-prog"></div>
        <div class="seek-thumb" id="seek-thumb"></div>
        <div class="seek-tip"   id="seek-tip"></div>
        <input class="seek-input" id="seek-input" type="range" min="0" max="10000" value="0" step="1">
      </div>
    </div>

    <div class="btn-row">

      <!-- Play/Pause -->
      <button class="cb lg" id="btn-pp" title="Play / Pause (Space)">
        <svg id="svg-play"  viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="svg-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>

      <!-- Back 10s -->
      <button class="cb" id="btn-bk" title="−10s (←)">
        <svg viewBox="0 0 24 24">
          <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
          <text x="7.8" y="15" style="font-size:5px;font-weight:700;fill:currentColor;font-family:inherit">10</text>
        </svg>
      </button>

      <!-- Fwd 10s -->
      <button class="cb" id="btn-fw" title="+10s (→)">
        <svg viewBox="0 0 24 24">
          <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
          <text x="7.8" y="15" style="font-size:5px;font-weight:700;fill:currentColor;font-family:inherit">10</text>
        </svg>
      </button>

      <!-- Volume -->
      <div class="vol-cluster">
        <button class="cb" id="btn-mute" title="Mute (M)">
          <svg id="svg-vol"  viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          <svg id="svg-mute" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3z"/></svg>
        </button>
        <div class="vol-bar-wrap">
          <input class="vol-range" id="vol-range" type="range" min="0" max="1" step="0.02" value="1">
        </div>
      </div>

      <!-- Time / Live -->
      <div class="time-box">
        <span class="live-pill" id="live-pill" onclick="snapToLive()">
          <span class="live-dot"></span>LIVE
        </span>
        <span id="t-cur-wrap" style="display:none"><b id="t-cur">0:00</b></span>
        <span id="t-sep"      style="display:none"> / </span>
        <span id="t-dur"      style="display:none">0:00</span>
      </div>

      <div class="spacer"></div>

      <!-- Quality -->
      <div class="qual-wrap" id="qual-wrap">
        <button class="qual-btn" id="qual-btn">
          <span class="qual-ico">⚙</span>
          <span class="ql-lbl" id="ql-lbl">Auto</span>
        </button>
        <div class="qual-menu" id="qual-menu">
          <div class="qm-head">Quality</div>
        </div>
      </div>

      <!-- PiP -->
      <button class="cb" id="btn-pip" title="Picture in Picture">
        <svg viewBox="0 0 24 24"><path d="M19 7h-8v6h8V7zm2-4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 1.99 2 1.99L21 21c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16.01H3V4.99h18v14.02z"/></svg>
      </button>

      <!-- Fullscreen -->
      <button class="cb" id="btn-fs" title="Fullscreen (F)">
        <svg id="svg-fs" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        <svg id="svg-ex" viewBox="0 0 24 24" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
      </button>

    </div>
  </div>

</div><!-- /shell -->

<script>
const QS     = new URLSearchParams(location.search);
const STREAM = QS.get('url')   || '';
const TITLE  = QS.get('title') || '';
if (TITLE) document.title = TITLE + ' — Player';

const shell    = document.getElementById('shell');
const video    = document.getElementById('video');
const bufEl    = document.getElementById('buf');
const rippleEl = document.getElementById('ripple');
const errScr   = document.getElementById('err-screen');
const errSub   = document.getElementById('err-sub');

const seekInput = document.getElementById('seek-input');
const seekProg  = document.getElementById('seek-prog');
const seekBufEl = document.getElementById('seek-buf');
const seekThumb = document.getElementById('seek-thumb');
const seekTip   = document.getElementById('seek-tip');
const seekRow   = document.getElementById('seek-row');

const btnPP    = document.getElementById('btn-pp');
const svgPlay  = document.getElementById('svg-play');
const svgPause = document.getElementById('svg-pause');

const btnMute  = document.getElementById('btn-mute');
const svgVol   = document.getElementById('svg-vol');
const svgMuteI = document.getElementById('svg-mute');
const volRange = document.getElementById('vol-range');

const livePill = document.getElementById('live-pill');
const tCurWrap = document.getElementById('t-cur-wrap');
const tSep     = document.getElementById('t-sep');
const tDurEl   = document.getElementById('t-dur');
const tCurEl   = document.getElementById('t-cur');

const qualBtn  = document.getElementById('qual-btn');
const qualMenu = document.getElementById('qual-menu');
const qlLbl    = document.getElementById('ql-lbl');
const btnFS    = document.getElementById('btn-fs');
const svgFs    = document.getElementById('svg-fs');
const svgEx    = document.getElementById('svg-ex');
const btnPiP   = document.getElementById('btn-pip');

let player    = null;
let isLive    = false;
let selHeight = null;
let isSeeking = false;
let ctrlTimer = null;

/* ── CONTROLS AUTO-HIDE ── */
function showCtrl() {
  shell.classList.add('ctrl-on');
  shell.classList.remove('hide-cursor');
  clearTimeout(ctrlTimer);
  ctrlTimer = setTimeout(() => {
    if (!video.paused) {
      shell.classList.remove('ctrl-on');
      shell.classList.add('hide-cursor');
    }
  }, 3200);
}
shell.addEventListener('mousemove',  showCtrl);
shell.addEventListener('touchstart', showCtrl, { passive: true });
video.addEventListener('pause', () => { shell.classList.add('ctrl-on'); shell.classList.remove('hide-cursor'); });

shell.addEventListener('click', e => {
  if (!e.target.closest('#controls,#err-screen')) togglePlay();
  showCtrl();
});
showCtrl();

/* ── PLAY / PAUSE ── */
function togglePlay() {
  if (video.paused) { video.play();  ripple('▶'); }
  else              { video.pause(); ripple('⏸'); }
}
btnPP.addEventListener('click', e => { e.stopPropagation(); togglePlay(); });
video.addEventListener('play',  () => { svgPlay.style.display='none'; svgPause.style.display=''; });
video.addEventListener('pause', () => { svgPlay.style.display='';     svgPause.style.display='none'; });

function ripple(icon) {
  rippleEl.innerHTML = `<div class="rip">${icon}</div>`;
}

/* ── SKIP ── */
document.getElementById('btn-bk').addEventListener('click', e => { e.stopPropagation(); video.currentTime = Math.max(0, video.currentTime - 10); ripple('«'); });
document.getElementById('btn-fw').addEventListener('click', e => { e.stopPropagation(); video.currentTime += 10; ripple('»'); });

/* ── KEYBOARD SHORTCUTS ── */
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  switch (e.key) {
    case ' ': case 'k': e.preventDefault(); togglePlay(); break;
    case 'ArrowLeft':   e.preventDefault(); video.currentTime = Math.max(0, video.currentTime - 10); ripple('«'); break;
    case 'ArrowRight':  e.preventDefault(); video.currentTime += 10; ripple('»'); break;
    case 'ArrowUp':     e.preventDefault(); video.volume = Math.min(1, video.volume + .1); break;
    case 'ArrowDown':   e.preventDefault(); video.volume = Math.max(0, video.volume - .1); break;
    case 'm': case 'M': toggleMute(); break;
    case 'f': case 'F': toggleFS(); break;
  }
  showCtrl();
});

/* ── SEEK BAR ── */
function refreshSeek() {
  if (isSeeking || !video.duration) return;
  const pct = video.currentTime / video.duration;
  seekProg.style.width  = (pct * 100) + '%';
  seekThumb.style.left  = (pct * 100) + '%';
  seekInput.value       = Math.round(pct * 10000);
  let bPct = 0;
  for (let i = 0; i < video.buffered.length; i++) {
    if (video.buffered.start(i) <= video.currentTime + .5)
      bPct = video.buffered.end(i) / video.duration;
  }
  seekBufEl.style.width = (Math.min(1, bPct) * 100) + '%';
}
video.addEventListener('timeupdate', refreshSeek);
video.addEventListener('progress',   refreshSeek);

seekInput.addEventListener('pointerdown', () => { isSeeking = true; });
seekInput.addEventListener('input', () => {
  const pct = seekInput.value / 10000;
  seekProg.style.width = (pct * 100) + '%';
  seekThumb.style.left = (pct * 100) + '%';
  if (video.duration) tCurEl.textContent = fmtT(pct * video.duration);
});
seekInput.addEventListener('change', () => {
  if (video.duration) video.currentTime = (seekInput.value / 10000) * video.duration;
  isSeeking = false;
});
seekRow.addEventListener('mousemove', e => {
  if (!video.duration) return;
  const r   = seekRow.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  seekTip.style.display = 'block';
  seekTip.style.left    = (pct * 100) + '%';
  seekTip.textContent   = fmtT(pct * video.duration);
});
seekRow.addEventListener('mouseleave', () => { seekTip.style.display = 'none'; });

/* ── TIME DISPLAY ── */
video.addEventListener('timeupdate', () => {
  if (isLive) {
    livePill.style.display = ''; tCurWrap.style.display='none'; tSep.style.display='none'; tDurEl.style.display='none';
    const s = video.seekable;
    if (s.length) livePill.classList.toggle('stale', s.end(s.length-1) - video.currentTime > 15);
  } else {
    livePill.style.display='none'; tCurWrap.style.display=''; tSep.style.display=''; tDurEl.style.display='';
    tCurEl.textContent = fmtT(video.currentTime);
    tDurEl.textContent = fmtT(video.duration);
  }
});
function snapToLive() {
  const s = video.seekable;
  if (s.length) { video.currentTime = s.end(s.length-1) - 1; video.play(); }
}
window.snapToLive = snapToLive;
function fmtT(s) {
  if (!s || !isFinite(s)) return '0:00';
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=Math.floor(s%60);
  return h ? `${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}` : `${m}:${String(sc).padStart(2,'0')}`;
}

/* ── VOLUME ── */
function toggleMute() { video.muted = !video.muted; syncVol(); }
function syncVol() {
  const m = video.muted || video.volume === 0;
  svgVol.style.display  = m ? 'none' : '';
  svgMuteI.style.display= m ? '' : 'none';
  volRange.value = m ? 0 : video.volume;
}
btnMute.addEventListener('click', e => { e.stopPropagation(); toggleMute(); });
volRange.addEventListener('input', () => { video.volume = parseFloat(volRange.value); video.muted = video.volume === 0; syncVol(); });
video.addEventListener('volumechange', syncVol);
syncVol();

/* ── QUALITY MENU ── */
qualBtn.addEventListener('click', e => { e.stopPropagation(); qualMenu.classList.toggle('open'); });
document.addEventListener('click', () => qualMenu.classList.remove('open'));

function buildQualMenu(tracks) {
  qualMenu.querySelectorAll('.qm-item').forEach(el => el.remove());

  const autoEl = document.createElement('div');
  autoEl.className = 'qm-item on';
  autoEl.innerHTML = `<span>Auto</span><span class="qm-check">✓</span>`;
  autoEl.addEventListener('click', () => {
    selHeight = null;
    player.configure({ abr:{ enabled:true } });
    const cur = player.getVariantTracks().find(t=>t.active);
    qlLbl.textContent = cur ? cur.height+'p' : 'Auto';
    qualMenu.querySelectorAll('.qm-item').forEach(d=>d.classList.remove('on'));
    autoEl.classList.add('on');
    qualMenu.classList.remove('open');
  });
  qualMenu.appendChild(autoEl);

  const seen = new Set();
  [...tracks].sort((a,b)=>b.height-a.height).forEach(t => {
    if (!t.height || seen.has(t.height)) return;
    seen.add(t.height);
    const el = document.createElement('div');
    el.className = 'qm-item';
    const kbps = t.bandwidth ? Math.round(t.bandwidth/1000)+' kbps' : '';
    el.innerHTML = `<span>${t.height}p</span><span class="qm-kbps">${kbps}</span><span class="qm-check">✓</span>`;
    el.addEventListener('click', () => {
      selHeight = t.height;
      qlLbl.textContent = t.height+'p';
      player.configure({ abr:{ enabled:false } });
      const match = player.getVariantTracks().find(v=>v.height===t.height);
      if (match) player.selectVariantTrack(match, true);
      qualMenu.querySelectorAll('.qm-item').forEach(d=>d.classList.remove('on'));
      el.classList.add('on');
      qualMenu.classList.remove('open');
    });
    qualMenu.appendChild(el);
  });
}

/* ── FULLSCREEN ── */
function toggleFS() {
  if (!document.fullscreenElement) (shell.requestFullscreen||shell.webkitRequestFullscreen).call(shell);
  else (document.exitFullscreen||document.webkitExitFullscreen).call(document);
}
btnFS.addEventListener('click', e => { e.stopPropagation(); toggleFS(); });
document.addEventListener('fullscreenchange', () => {
  const full = !!document.fullscreenElement;
  svgFs.style.display = full?'none':''; svgEx.style.display = full?'':'none';
});

/* ── PiP ── */
if (document.pictureInPictureEnabled) {
  btnPiP.style.display = '';
  btnPiP.addEventListener('click', async e => {
    e.stopPropagation();
    if (document.pictureInPictureElement) await document.exitPictureInPicture();
    else await video.requestPictureInPicture();
  });
}

/* ── BUFFERING INDICATOR ── */
video.addEventListener('waiting', () => bufEl.classList.add('on'));
video.addEventListener('playing', () => bufEl.classList.remove('on'));
video.addEventListener('canplay', () => bufEl.classList.remove('on'));

/* ── ERROR SCREEN ── */
function showError(msg) {
  bufEl.classList.remove('on');
  errSub.textContent = msg || 'The stream could not be loaded.';
  errScr.classList.add('on');
}
document.getElementById('btn-retry').addEventListener('click', () => {
  errScr.classList.remove('on');
  initPlayer();
});

/* ── INIT SHAKA PLAYER ── */
async function initPlayer() {
  if (!STREAM) { showError('No stream URL provided. Add ?url=https://...m3u8 to the page URL.'); return; }

  shaka.polyfill.installAll();
  if (!shaka.Player.isBrowserSupported()) { showError('Your browser does not support HLS playback. Try Chrome or Firefox.'); return; }

  try {
    if (player) { await player.destroy(); player = null; }

    player = new shaka.Player();
    await player.attach(video);

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
      request.headers['User-Agent'] = 'ReactNativeVideo/9.3.0 (Linux;Android 13) AndroidXMedia3/1.6.1';
      request.headers['Referer']    = 'https://fancode.com/';
    });

    player.configure({
      streaming: {
        bufferingGoal:   10,
        rebufferingGoal: 2,
        bufferBehind:    30,
        retryParameters: { maxAttempts: 5, baseDelay: 500, backoffFactor: 1.5, fuzzFactor: .5, timeout: 30000 },
      },
      abr: { enabled: true },
      manifest: {
        retryParameters: { timeout:30000, maxAttempts:2, baseDelay:1000, backoffFactor:2, fuzzFactor:.5 }
      }
    });

    player.addEventListener('error', ev => {
      const code = ev.detail?.code;
      let msg = 'The stream could not be loaded.';
      if (code===1001||code===1002)  msg = 'Network error — check your connection and retry.';
      else if (code===3015||code===3016) msg = 'Stream token expired. Please reload the match page.';
      else if (code===4001) msg = 'This stream format is not supported by your browser.';
      showError(msg);
    });

    player.addEventListener('adaptation', () => {
      if (selHeight !== null) return;
      const active = player.getVariantTracks().find(t=>t.active);
      if (active) qlLbl.textContent = active.height+'p';
    });

    bufEl.classList.add('on');
    await player.load(STREAM);
    bufEl.classList.remove('on');

    isLive = player.isLive();

    if (isLive) {
      seekInput.style.pointerEvents='none';
      seekProg.style.width='100%'; seekBufEl.style.width='100%';
    }

    const tracks = player.getVariantTracks();
    if (tracks.length > 0) buildQualMenu(tracks);
    else document.getElementById('qual-wrap').style.display='none';

    video.autoplay=true; video.controls=false; video.volume=1; video.muted=false; video.preload='auto';
    const tryPlay = async () => {
      try { await video.play(); }
      catch { video.muted=true; try { await video.play(); } catch {} }
    };
    video.readyState >= 2 ? await tryPlay() : video.addEventListener('canplay', tryPlay, { once:true });

  } catch (err) {
    console.error('Player error:', err);
    bufEl.classList.remove('on');
    video.src = STREAM; video.autoplay=true; video.muted=false;
    try { await video.play(); }
    catch { video.muted=true; await video.play().catch(()=>{}); }
  }
}

document.addEventListener('DOMContentLoaded', () => initPlayer().catch(console.error));
</script>
