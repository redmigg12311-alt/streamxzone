<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StreamZone Player</title>
<meta name="robots" content="noindex">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Outfit',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

/* Top bar */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:48px;
  display:flex;align-items:center;gap:10px;
  padding:0 16px;
  background:linear-gradient(rgba(0,0,0,.9) 0%,transparent 100%);
  pointer-events:none;
  transition:opacity .3s;
}
#topbar.hide{opacity:0}
.logo-sm{display:flex;align-items:center;gap:7px;pointer-events:all}
.logo-sm-mark{width:26px;height:26px;border-radius:6px;background:#ff3355;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-sm-mark svg{width:10px;height:10px;fill:#fff}
.logo-sm-name{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.04em}
.logo-sm-name b{color:#ff3355}
#match-title{
  flex:1;font-size:13px;font-weight:600;color:rgba(255,255,255,.8);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:-.01em;pointer-events:none;
}
.live-badge{
  display:none;align-items:center;gap:5px;
  background:#ff3355;color:#fff;
  font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 9px;border-radius:4px;flex-shrink:0;pointer-events:none;
}
.live-badge.on{display:flex}
.live-badge-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:pulse 1.4s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.back-btn{
  pointer-events:all;
  width:32px;height:32px;border-radius:8px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;text-decoration:none;flex-shrink:0;transition:all .15s;
}
.back-btn:hover{background:rgba(255,255,255,.2)}
.back-btn svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* Video */
#video-wrap{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:#000}
#player{width:100%;height:100%;object-fit:contain;display:block;transition:opacity .3s}
#player.hidden{opacity:0}

/* Loader */
#loader{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  background:#000;
}
#loader-ring{
  width:52px;height:52px;
  border:3px solid rgba(255,255,255,.08);
  border-top-color:#ff3355;
  border-radius:50%;
  animation:spin .9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loader-text{color:rgba(255,255,255,.3);font-size:13px;font-weight:400;letter-spacing:.02em}
#loader-title{color:rgba(255,255,255,.6);font-size:14px;font-weight:600;letter-spacing:-.01em;text-align:center;max-width:280px;line-height:1.4}

/* Error */
#error{
  position:fixed;inset:0;z-index:60;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:#000;text-align:center;padding:24px;
}
#error-icon{font-size:52px;line-height:1}
#error-title{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.03em}
#error-msg{font-size:13px;color:rgba(255,255,255,.4);line-height:1.7;max-width:290px}
.err-btn{
  margin-top:6px;border:none;cursor:pointer;font-family:inherit;
  font-size:13px;font-weight:600;padding:11px 22px;border-radius:10px;
  transition:all .18s;display:inline-flex;align-items:center;gap:7px;
}
.err-btn.primary{background:#ff3355;color:#fff;box-shadow:0 4px 20px rgba(255,51,85,.3)}
.err-btn.primary:hover{background:#cc1133;transform:translateY(-1px)}
.err-btn.ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.err-btn.ghost:hover{background:rgba(255,255,255,.1)}
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <a class="back-btn" href="/" title="Back to StreamZone">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <a class="logo-sm" href="/">
    <div class="logo-sm-mark"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
    <span class="logo-sm-name">Stream<b>Zone</b></span>
  </a>
  <div id="match-title">Loading…</div>
  <div class="live-badge" id="live-badge">
    <span class="live-badge-dot"></span>LIVE
  </div>
</div>

<!-- Video player -->
<div id="video-wrap">
  <video id="player" controls autoplay playsinline class="hidden"></video>
</div>

<!-- Loader -->
<div id="loader">
  <div id="loader-ring"></div>
  <div id="loader-title" style="display:none"></div>
  <div id="loader-text">Connecting to stream…</div>
</div>

<!-- Error -->
<div id="error">
  <div id="error-icon">📡</div>
  <div id="error-title">Stream Unavailable</div>
  <div id="error-msg">The stream could not be loaded. It may have expired or requires different access.</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:6px">
    <button class="err-btn primary" onclick="reloadPlayer()">↻ Try Again</button>
    <button class="err-btn ghost" onclick="copyUrl()">⎘ Copy URL</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
<script>
// Read params from URL
const params = new URLSearchParams(location.search);
const streamUrl = params.get('url') || '';
const title = params.get('title') || 'StreamZone Player';
const isLive = params.get('live') === '1';

// Set page title + UI
document.title = title + ' — StreamZone';
document.getElementById('match-title').textContent = title;
document.getElementById('loader-title').textContent = title;
document.getElementById('loader-title').style.display = 'block';
if (isLive) document.getElementById('live-badge').classList.add('on');

let hlsInst = null;
const video = document.getElementById('player');
const loader = document.getElementById('loader');
const errEl = document.getElementById('error');

function showLoader() {
  loader.style.display = 'flex';
  errEl.style.display = 'none';
  video.classList.add('hidden');
}
function showPlayer() {
  loader.style.display = 'none';
  errEl.style.display = 'none';
  video.classList.remove('hidden');
  video.play().catch(() => {});
}
function showError() {
  loader.style.display = 'none';
  video.classList.add('hidden');
  errEl.style.display = 'flex';
}

function startStream(url) {
  if (!url) { showError(); return; }
  if (hlsInst) { hlsInst.destroy(); hlsInst = null; }
  video.src = '';
  showLoader();

  if (Hls.isSupported()) {
    hlsInst = new Hls({ enableWorker: false, lowLatencyMode: true });
    hlsInst.loadSource(url);
    hlsInst.attachMedia(video);
    hlsInst.on(Hls.Events.MANIFEST_PARSED, showPlayer);
    hlsInst.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) showError(); });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadedmetadata', showPlayer, { once: true });
    video.addEventListener('error', showError, { once: true });
  } else {
    showError();
  }
}

function reloadPlayer() { startStream(streamUrl); }

function copyUrl() {
  navigator.clipboard?.writeText(streamUrl)
    .then(() => { document.querySelector('.err-btn.ghost').textContent = '✓ Copied!'; })
    .catch(() => {});
}

// Auto-hide top bar after 3s of no mouse movement
let hideTimer;
function resetHide() {
  document.getElementById('topbar').classList.remove('hide');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    if (!video.paused) document.getElementById('topbar').classList.add('hide');
  }, 3000);
}
document.addEventListener('mousemove', resetHide);
document.addEventListener('touchstart', resetHide);

// Start
if (streamUrl) {
  startStream(streamUrl);
} else {
  showError();
  document.getElementById('error-msg').textContent = 'No stream URL provided.';
}
</script>
</body>
</html>
